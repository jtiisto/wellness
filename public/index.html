<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Personal wellness dashboard">
    <link rel="manifest" href="/wellness/manifest.json">
    <link rel="icon" href="/wellness/icons/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="/wellness/icons/apple-touch-icon.png">
    <title>Wellness</title>
    <link rel="preload" href="/wellness/fonts/Inter-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/wellness/fonts/Inter-Medium.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/wellness/fonts/Inter-SemiBold.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/wellness/styles.css">
    <!-- Runtime libraries are vendored same-origin under js/vendor/ (see
         js/vendor/README.md) so the offline PWA has no hard dependency on a
         third-party CDN. preact/hooks and @preact/signals import the bare
         "preact" specifier, which this map resolves to the single vendored
         preact.js — preserving the one-instance invariant they require. -->
    <script type="importmap">
    {
        "imports": {
            "preact": "/wellness/js/vendor/preact.js",
            "preact/hooks": "/wellness/js/vendor/preact-hooks.js",
            "@preact/signals": "/wellness/js/vendor/preact-signals.js",
            "htm": "/wellness/js/vendor/htm.js",
            "localforage": "/wellness/js/vendor/localforage.js",
            "marked": "/wellness/js/vendor/marked.js"
        }
    }
    </script>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/wellness/js/app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/wellness/sw.js', { scope: '/wellness/' }).then(reg => {
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') reg.update();
          });
        }).catch(() => {});
      }
    </script>
</body>
</html>
